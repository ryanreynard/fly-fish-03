function getConditions(spot, dateStr){
  const m = getMonth(dateStr);
  const season = getSeason(m);
  return { season, ...spot.seasons[season] };
}

const OC = { Excellent:"#4ade80", Good:"#86efac", Fair:"#fbbf24", Poor:"#f87171" };

function Badge({ label, value }){
  return React.createElement("div",{style:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(126,184,164,0.18)",borderRadius:"8px",padding:"8px 12px",minWidth:"80px"}},
    React.createElement("div",{style:{fontSize:"9px",textTransform:"uppercase",letterSpacing:"0.14em",color:"#7eb8a4",marginBottom:"3px",fontFamily:"monospace"}},label),
    React.createElement("div",{style:{fontSize:"12px",color:"#e8f0ec",fontWeight:"600",lineHeight:"1.3"}},value)
  );
}

function SpotCard({ spot, date }){
  const [open, setOpen] = useState(false);
  const cond = getConditions(spot, date);
  const oc = OC[cond.outlook] || "#7eb8a4";
  return (
    <div style={{background:"linear-gradient(135deg,rgba(18,32,24,0.97),rgba(12,22,17,0.99))",border:"1px solid rgba(74,155,122,0.18)",borderRadius:"14px",overflow:"hidden",marginBottom:"10px"}}

      onMouseLeave={e=>e.currentTarget.style.borderColor="rgba(74,155,122,0.18)"}>
      <div onClick={()=>setOpen(o=>!o)} style={{padding:"15px 17px 12px",display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"10px",cursor:"pointer"}}>
        <div style={{display:"flex",gap:"10px",alignItems:"flex-start"}}>
          <span style={{fontSize:"20px",lineHeight:1,marginTop:"3px"}}>{spot.emoji}</span>
          <div>
            <div style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"15px",fontWeight:"700",color:"#e8f0ec",lineHeight:1.2}}>{spot.name}</div>
            <div style={{fontSize:"10px",color:"#7eb8a4",marginTop:"3px",fontFamily:"monospace",letterSpacing:"0.05em"}}>{spot.section} · {spot.state} · {spot.type==="stillwater"?"🏞 Stillwater":"〰 River"}</div>
            <div style={{fontSize:"10px",color:"#5a9a70",marginTop:"2px",fontFamily:"monospace"}}>{spot.species.join(" · ")}</div>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"6px",flexShrink:0}}>
          <div style={{padding:"3px 8px",borderRadius:"20px",fontSize:"9px",fontWeight:"700",fontFamily:"monospace",background:`${oc}18`,color:oc,border:`1px solid ${oc}40`}}>{cond.outlook.toUpperCase()}</div>
          <div style={{fontSize:"9px",color:"#3d6a50",fontFamily:"monospace"}}>{cond.season.toUpperCase()} · {open?"▲":"▼"}</div>
        </div>
      </div>
      <div style={{padding:"0 17px 10px",display:"flex",gap:"7px",flexWrap:"wrap",borderBottom:"1px solid rgba(74,155,122,0.08)"}}>
        {spot.type!=="stillwater"&&cond.flow&&cond.flow!=="N/A"&&<Badge label="Flow" value={cond.flow}/>}
        <Badge label="Temp" value={cond.temp}/>
        <Badge label="Clarity" value={cond.clarity}/>
      </div>
      {open&&(
        <div style={{padding:"14px 17px 18px"}}>
          <div style={{marginBottom:"12px",padding:"10px 12px",background:"rgba(60,140,90,0.07)",borderRadius:"8px",border:"1px solid rgba(74,155,122,0.12)"}}>
            <div style={{fontSize:"9px",textTransform:"uppercase",letterSpacing:"0.14em",color:"#7eb8a4",marginBottom:"4px",fontFamily:"monospace"}}>☁ Weather</div>
            <div style={{fontSize:"13px",color:"#c8ddd5",fontFamily:"'Crimson Pro',serif"}}>{cond.weather}</div>
          </div>
          <div style={{marginBottom:"14px"}}>
            <div style={{fontSize:"9px",textTransform:"uppercase",letterSpacing:"0.14em",color:oc,marginBottom:"4px",fontFamily:"monospace"}}>● Outlook: {cond.outlook}</div>
            <div style={{fontSize:"13px",color:"#c8ddd5",fontFamily:"'Crimson Pro',serif",fontStyle:"italic"}}>{cond.outlookReason}</div>
          </div>
          <div style={{marginBottom:"14px"}}>
            <div style={{fontSize:"9px",textTransform:"uppercase",letterSpacing:"0.14em",color:"#a8d5be",marginBottom:"8px",fontFamily:"monospace",borderLeft:"2px solid #4a9b7a",paddingLeft:"8px"}}>🪰 Fly Patterns</div>
            {cond.patterns.map((p,i)=>(
              <div key={i} style={{marginBottom:"8px",paddingLeft:"10px",borderLeft:"1px solid rgba(74,155,122,0.2)"}}>
                <div style={{display:"flex",gap:"8px",alignItems:"baseline",flexWrap:"wrap"}}>
                  <span style={{color:"#e8f0ec",fontFamily:"'Crimson Pro',serif",fontSize:"14px",fontWeight:"600"}}>{p.name}</span>
                  <span style={{color:"#4a9b7a",fontFamily:"monospace",fontSize:"10px"}}>{p.size}</span>
                </div>
                <div style={{color:"#7eb8a4",fontSize:"12px",fontFamily:"'Crimson Pro',serif",fontStyle:"italic",marginTop:"1px"}}>{p.note}</div>
              </div>
            ))}
          </div>
          <div style={{marginBottom:"10px"}}>
            <div style={{fontSize:"9px",textTransform:"uppercase",letterSpacing:"0.14em",color:"#a8d5be",marginBottom:"6px",fontFamily:"monospace",borderLeft:"2px solid #4a9b7a",paddingLeft:"8px"}}>🎯 Technique</div>
            <div style={{fontSize:"13px",color:"#c8ddd5",fontFamily:"'Crimson Pro',serif",lineHeight:"1.7",paddingLeft:"10px"}}>{cond.technique}</div>
          </div>
          <button onClick={()=>setOpen(false)} style={{marginTop:"10px",padding:"5px 13px",background:"transparent",border:"1px solid rgba(74,155,122,0.22)",borderRadius:"6px",color:"#7eb8a4",fontSize:"10px",fontFamily:"monospace",cursor:"pointer"}}>▲ Collapse</button>
        </div>
      )}
    </div>
  );
}

function App(){
  const [date,setDate]=useState(today);
  const [filter,setFilter]=useState("all");
  const filtered=SPOTS.filter(s=>filter==="all"||s.type===filter);
  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#08160f 0%,#0c1c14 45%,#071108 100%)",fontFamily:"'Crimson Pro',Georgia,serif"}}>
      <div style={{maxWidth:"800px",margin:"0 auto",padding:"0 14px 56px"}}>
        <div style={{textAlign:"center",padding:"42px 0 26px"}}>
          <div style={{fontSize:"10px",fontFamily:"monospace",letterSpacing:"0.24em",color:"#3d8a60",marginBottom:"10px",textTransform:"uppercase"}}>Fly Fishing · Conditions Report</div>
          <h1 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"clamp(26px,5.5vw,48px)",fontWeight:"900",color:"#deeee6",margin:"0 0 6px",lineHeight:1.1,textShadow:"0 0 50px rgba(60,140,90,0.35)"}}>The Water's Report</h1>
          <p style={{color:"#4a8a65",fontSize:"13px",margin:"0 0 24px"}}>{SPOTS.length} favorite spots · Seasonal expert knowledge</p>
          <div style={{display:"inline-flex",alignItems:"center",gap:"11px",background:"rgba(60,140,90,0.07)",border:"1px solid rgba(60,140,90,0.2)",borderRadius:"40px",padding:"8px 18px"}}>
            <span style={{color:"#6aaa88",fontSize:"10px",fontFamily:"monospace",letterSpacing:"0.12em"}}>DATE</span>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{background:"transparent",border:"none",color:"#deeee6",fontSize:"14px",fontFamily:"'Crimson Pro',serif",cursor:"pointer",outline:"none"}}/>
          </div>
        </div>
        <div style={{display:"flex",gap:"7px",marginBottom:"16px",justifyContent:"center",flexWrap:"wrap"}}>
          {[["all","All Spots"],["river","Rivers & Creeks"],["stillwater","Stillwaters"]].map(([v,l])=>(
            <button key={v} onClick={()=>setFilter(v)} style={{padding:"5px 14px",borderRadius:"20px",fontSize:"10px",fontFamily:"monospace",letterSpacing:"0.08em",cursor:"pointer",border:filter===v?"1px solid #3d8a60":"1px solid rgba(60,140,90,0.16)",background:filter===v?"rgba(60,140,90,0.15)":"transparent",color:filter===v?"#8acfaa":"#4a8a65"}}>{l}</button>
          ))}
        </div>
        <div style={{textAlign:"center",marginBottom:"14px",fontSize:"10px",color:"#2a5a3a",fontFamily:"monospace",letterSpacing:"0.12em"}}>{filtered.length} SPOTS · TAP ANY CARD TO EXPAND</div>
        <div>{filtered.map(spot=><SpotCard key={spot.id} spot={spot} date={date}/>)}</div>
        <div style={{textAlign:"center",marginTop:"34px",color:"#1e4028",fontSize:"9px",fontFamily:"monospace",letterSpacing:"0.14em"}}>VERIFY FLOWS AT USGS WATERDATA.USGS.GOV</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
